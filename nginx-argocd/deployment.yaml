apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-9090
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-9090
  template:
    metadata:
      labels:
        app: nginx-9090
    spec:
      containers:
        - name: nginx
          image: nginx:latest
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
